name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check Python version
      run: python --version
    
    - name: List installed packages
      run: pip list
    
    - name: Verify imports
      run: |
        python -c "import pandas; import numpy; import matplotlib; import seaborn; print('All imports successful!')"